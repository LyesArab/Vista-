input:
  video: data/sequences/DroneSim.mp4

output:
  dir: ./out/severity/cfg_severity

device: cuda:0
save_annotated_frames_frequency: 30

# ── Detector ──────────────────────────────────────────────────────────────────
# Use a YOLO model fine-tuned on VistaCrash so that the "crashed_car" class
# provides an immediate binary severity signal at detection time.
# Replace with your best VistaCrash checkpoint (e.g. from cfg32.yaml run).
yolo:
  model: runs/detect/vistacrashe_x/weights/best.pt   # set after training
  base_model: yolo12x.pt                              # fallback when fine-tuned model is missing
  conf: 0.9                                         # raised from 0.05; 0.05 is too noisy at UAV altitude
  iou_match_threshold: 0.5

# ── Severity pipeline ─────────────────────────────────────────────────────────
pipeline:
  class: vista.pipeline.severity.SeverityPipeline
  caption_stride: 30       # run VLM every 30 frames (~1 s at 30 FPS)
  history_len: 5           # captions retained per track for peak-severity
  check_emergency: true    # probe trucks/buses for ambulance/police identity

# ── VLM captioner (zero-shot — no VISTA-label supervision) ───────────────────
# The VLM is called only to *refine* severity on per-track crops.
# It is never shown ground-truth VISTA captions during inference.
qwen:
  model_id: unsloth/Qwen3-VL-32B-Instruct-unsloth-bnb-4bit
  every_n_frames: 30        # run VLM every 30 frames (~1 s at 30 FPS)
  max_new_tokens: 1024      # JSON output needs room; 32 was too short and caused empty parses
  image_target_size: 1024   # full-frame detection needs full resolution
  # System prompt for full-frame object detection with severity-aware labels.
  # qwen_yolo.py expects a JSON array of {"bbox_2d": [...], "label": "..."}.
  system_prompt: >
    You are a computer vision assistant analysing drone footage of a road
    accident scene. Detect every relevant object and assign it EXACTLY ONE
    label chosen from the two lists below. You MUST use the exact string as
    written — do not paraphrase, abbreviate, or invent new labels.

    Vehicle labels (pick the one that best describes the vehicle's damage):
      "undamaged"
      "minor damage"
      "heavily damaged"
      "overturned"
      "on fire"
      "ambulance on scene"
      "fire truck on scene"
      "police on scene"
      "emergency vehicle"

    Person labels (pick the one that best describes the person's status):
      "standing"
      "running"
      "helping"
      "calling for help"
      "injured, sitting"
      "injured, lying"
      "unconscious"

    Output format — return a valid JSON array ONLY, no other text:
    [{"bbox_2d": [xmin, ymin, xmax, ymax], "label": "<exact label from list>"}, ...]

    Example:
    [{"bbox_2d": [10, 30, 200, 160], "label": "heavily damaged"}, {"bbox_2d": [220, 50, 260, 120], "label": "injured, lying"}]
  user_prompt: "Analyse this drone footage frame. For each object inside
    the bounding box, assign exactly one severity label from
    the provided lists. Focus on visible damage, posture,
    and behaviour."
